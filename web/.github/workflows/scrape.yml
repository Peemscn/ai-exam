name: re-scrape restaurants

# trigger: ปุ่มบนเว็บ (/api/scrape → workflow_dispatch) หรือ schedule รายสัปดาห์
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0" # อาทิตย์ 18:00 UTC = จันทร์ 01:00 ไทย (refresh weekly)

permissions:
  contents: write

defaults:
  run:
    working-directory: web

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci

      # Apify (primary) ถ้ามี secret APIFY_TOKEN · ไม่งั้น chromium (fallback — lite)
      - name: scrape (Apify primary / chromium fallback)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          if [ -n "$APIFY_TOKEN" ]; then
            node scripts/scrape-apify.mjs
          else
            npx playwright install --with-deps chromium
            node scripts/scrape.mjs
          fi

      - run: python scripts/clean.py
      - run: python scripts/score.py

      - name: seed Turso (ถ้ามี secret)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: if [ -n "$TURSO_DATABASE_URL" ]; then node db/seed.mjs; fi

      - name: commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scored.json data/clean.json data/clean.csv data/raw_maps.json data/raw_osm.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: re-scrape restaurant data [skip ci]"
          git push

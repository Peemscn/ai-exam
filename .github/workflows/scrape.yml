name: re-scrape restaurants

# trigger: manual เท่านั้น (workflow_dispatch) — re-scrape Apify + reseed Turso
#   ปุ่มบนเว็บใช้ Apify REST ตรง (ไม่ผ่าน CI) · ตัด schedule weekly กัน Apify quota
on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: web

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bun install --frozen-lockfile

      # Apify (primary) ถ้ามี secret APIFY_TOKEN · ไม่งั้น chromium (fallback — lite)
      - name: scrape (Apify primary / chromium fallback)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          if [ -n "$APIFY_TOKEN" ]; then
            bun scripts/scrape-apify.mjs
          else
            bunx playwright install --with-deps chromium
            bun scripts/scrape.mjs
          fi

      - run: python scripts/clean.py
      - run: python scripts/score.py

      - name: seed Turso (ถ้ามี secret)
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: if [ -n "$TURSO_DATABASE_URL" ]; then bun db/seed.mjs; fi

      - name: commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scored.json data/clean.json data/clean.csv data/raw_maps.json data/raw_osm.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: re-scrape restaurant data [skip ci]"
          git push
